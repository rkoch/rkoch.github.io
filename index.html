<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Remo Koch — KI-Integration für KMU</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=Newsreader:ital,opsz,wght@0,18..72,400;0,18..72,500;0,18..72,600;1,18..72,400&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* color */
    --paper: #F6F5EF;
    --paper-2: #EEEAE0;
    --card: #FCFBF7;
    --ink: #1A2228;
    --ink-2: #2E373E;
    --ink-soft: #5A636A;
    --line: #E0DDD4;
    --line-2: #D0CCC0;
    --dark: #0C1C28;
    --dark-2: #122838;
    --dark-soft: #93A6B4;

    /* accent — overridden by Tweaks (default: navy #19394e) */
    --accent: #19394e;
    --accent-strong: #102634;
    --accent-bright: #5C9BC0;
    --accent-tint: #E5EAEF;

    /* type — overridden by Tweaks */
    --font-display: 'IBM Plex Sans', system-ui, sans-serif;
    --font-body: 'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
    --display-weight: 600;
    --display-spacing: -0.02em;

    --maxw: 1180px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    font-size: 17px;
    line-height: 1.6;
    font-weight: 400;
  }
  ::selection { background: var(--accent); color: #fff; }
  img { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  h1, h2, h3, h4 {
    font-family: var(--font-display);
    font-weight: var(--display-weight);
    letter-spacing: var(--display-spacing);
    line-height: 1.05;
    color: var(--ink);
    text-wrap: balance;
  }

  .mono {
    font-family: var(--font-mono);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.72rem;
  }

  .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 32px; }

  /* reveal on scroll — transform-only so content is NEVER hidden if motion is unavailable */
  .reveal { transform: translateY(20px); transition: transform .7s cubic-bezier(.2,.7,.2,1); will-change: transform; }
  .reveal.in { transform: none; }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .reveal { transform: none; transition: none; }
  }

  /* page transition — transform-only so opacity can never get stuck hidden */
  .page-enter { animation: pageIn .5s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes pageIn { from { transform: translateY(8px); } to { transform: none; } }

  image-slot { --is-bg: var(--paper-2); }

  @media (max-width: 720px) {
    body { font-size: 16px; }
    .wrap { padding: 0 20px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="image-slot.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="contact.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="about.jsx"></script>
  <script type="text/babel" src="offer.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
